<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Market Analysis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 48px;
            font-weight: bold;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 48px;
            font-size: 18px;
        }
        .collections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }
        .collection-card {
            background: linear-gradient(135deg, #12122a, #1a1a3a);
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 28px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .collection-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        .collection-card:hover {
            transform: translateY(-4px);
            border-color: #7b2ff7;
            box-shadow: 0 12px 24px rgba(123, 47, 247, 0.3);
        }
        .collection-card:hover::before {
            transform: scaleX(1);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 22px;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 8px;
        }
        .card-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .stat {
            background: #1a0a2e;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2a1a3e;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #00d4ff;
        }
        .card-description {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            margin-top: 12px;
        }
        .card-date {
            font-size: 13px;
            color: #888;
            margin-top: 12px;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 6px;
            margin-top: 8px;
        }
        .badge-featured {
            background: #ffdd00;
            color: #1a1a3a;
        }
        .footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid #2a2a4a;
            color: #666;
            font-size: 14px;
        }
        .footer a {
            color: #00d4ff;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 CS2 Market Analysis</h1>
        <p class="subtitle">Анализ накопления и инвестиционного потенциала предметов</p>

        <div class="collections-grid" id="collections">
            <!-- Коллекции будут добавлены через JavaScript -->
        </div>

        <div class="footer">
            Powered by <a href="https://github.com">GitHub Pages</a> |
            Generated with Claude Code
        </div>
    </div>

    <script>
        // Конфигурация коллекций
        const collections = [
            {
                title: "The Graphic Design Collection",
                date: "2026-03-24",
                file: "The_Graphic_Design_Collection_2026_03_24.html",
                items: 80,
                topScore: 1,
                description: "Полное сканирование коллекции с анализом накопления",
                badges: ["featured"]
            },
            {
                title: "The Graphic Design Collection",
                date: "2026-03-24",
                file: "scan_2026_03_24.html",
                items: 80,
                topScore: 1,
                description: "Полное сканирование коллекции с анализом накопления",
                badges: ["featured"]
            },
            {
                title: "The Train 2025 Collection",
                date: "2026-03-23",
                file: "scan_2026_03_23.html",
                items: 74,
                topScore: 1,
                description: "Полное сканирование коллекции с анализом накопления",
                badges: ["featured"]
            }
            // Добавляйте новые коллекции здесь
        ];

        // Рендер коллекций
        function renderCollections() {
            const container = document.getElementById('collections');

            collections.forEach(col => {
                const card = document.createElement('div');
                card.className = 'collection-card';
                card.onclick = () => window.location.href = col.file;

                let badgesHtml = '';
                if (col.badges.includes('featured')) {
                    badgesHtml += '<span class="badge badge-featured">FEATURED</span>';
                }

                card.innerHTML = `
                    <div class="card-header">
                        <div style="flex: 1;">
                            <div class="card-title">${col.title}</div>
                        </div>
                    </div>
                    <div class="card-stats">
                        <div class="stat">
                            <div class="stat-label">Items</div>
                            <div class="stat-value">${col.items}</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Top Score</div>
                            <div class="stat-value">${col.topScore}</div>
                        </div>
                    </div>
                    <div class="card-description">${col.description}</div>
                    <div class="card-date">Дата анализа: ${col.date}</div>
                    ${badgesHtml}
                `;

                container.appendChild(card);
            });
        }

        renderCollections();
    </script>
</body>
</html>
